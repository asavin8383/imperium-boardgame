server:
  port: 15800
  tomcat:
    max-threads: 200
logging:
  config: config/logback-spring.xml
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true
    ip-address: "${EXT_IP}"
spring:
  application:
    name: ppm
  liquibase:
    enabled: false
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    username: as_user
    password: as_user
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect
  app:
    jwt:
      secret: Gk-Xun_Yrkd0zigpysWS
      ttl: 86400
    cors:
      origin: "*"
  cloud:
    stream:
      bindings:
        outputArrangementJobs:
          content-type: application/json
        inputArrangementNotifications:
          content-type: application/json
          group: portal
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
ldap:
  enabled: true
  domain: designdiv.ecleasing.ru
  urls: ldap://192.168.1.52:389/
  base:
    dn: OU=AS_15_8,DC=designdiv,DC=ecleasing,DC=ru
  user:
    dn:
      pattern: sAMAccountName={0}
  login:
    role_oper: CN=ROLE_OPERATOR,OU=roles,OU=AS_15_8,DC=designdiv,DC=ecleasing,DC=ru
    role_admin: CN=ROLE_ADMIN,OU=roles,OU=AS_15_8,DC=designdiv,DC=ecleasing,DC=ru
    filter_oper: "(&(objectClass=user)(memberof=${ldap.login.role_oper}))"
    filter_admin: "(&(objectClass=user)(memberof=${ldap.login.role_admin}))"
    #filter: "(&(objectClass=user)(userPrincipalName={0})(memberof=${ldap.login.role}))"
  admin: sa
  password: 12345

