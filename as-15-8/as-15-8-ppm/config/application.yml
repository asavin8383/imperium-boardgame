spring:
  main.allow-bean-definition-overriding: true
  cloud:
    stream:
      bindings:
        outputJobs:
          destination: scheduled_jobs
        springCloudBusInput:
          destination: bus_config_input
          group: ppm
        springCloudBusOutput:
          destination: bus_config_output
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
          configuration:
            max.request.size: 10485760
        bindings:
          outputJobs:
            producer.configuration:
              key.serializer: org.apache.kafka.common.serialization.StringSerializer
  liquibase:
    enabled: true
    change-log: classpath:db/db.changelog.master.xml
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    username: as_user
    password: as_user
  jpa:
    properties:
      hibernate:
        ddl-auto: none
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect
app:
 #  second, minute, hour, day of month, month, day(s) of week
 schedule: "0 * * ? * *"

---

spring:
  profiles: prod
  profiles.include: docker_log
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:postgresql://10.97.220.144:5432/asdb
  cloud:
    stream:
      kafka:
        binder:
          brokers: 10.97.220.141:9094,10.97.220.142:9094,10.97.220.143:9094

