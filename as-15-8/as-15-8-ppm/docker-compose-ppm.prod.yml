version: '3.7'
services:
  ppm:
    container_name: ppm
    image: dcr.ec-leasing.ru/as-15-8/as-15-8-ppm
    restart: always
    network_mode: "host"
    volumes:
      - ~/as-15-8-ppm/logs:/log
      - ~/as-15-8-ppm/config:/config
    environment:
      PROFILE: test
      GATEWAY_URI: http://10.97.220.134:15880
      TZ: "Europe/Moscow"
    ports:
      - "15803:15803"
    labels:
      collect_logs_with_filebeat: "true"
      decode_log_event_to_json_object: "true"