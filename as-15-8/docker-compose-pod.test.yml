version: '3.7'
services:
  as-15-8-uploader:
    container_name: as-15-8-uploader
    image: harbor.ec-leasing.ru/as_15_8/as-15-8-uploader
    restart: always
    hostname: as-15-8-pod
    volumes:
      - ~/as-15-8-pod/uploader/logs:/log
      - ~/as-15-8-pod/uploader/config:/config
    environment:
      PROFILE: test
      EUREKA_URI: http://192.168.5.253:8761/eureka
      EXT_IP: 192.168.5.210
      TZ: "Europe/Moscow"
    ports:
      - "15801:15801"