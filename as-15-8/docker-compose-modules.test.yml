version: '3.2'
networks:
    as-15-8-net:
        external: true
services:
    dispatcher:
        image: harbor.ec-leasing.ru/as_15_8/as-15-8-dispatcher:latest
        networks:
            - as-15-8-net
        environment:
            PROFILE: test
            TZ: "Europe/Moscow"
        volumes:
            - ~/as-15-8-modules/dispatcher-module/logs:/log
    executor:
        image: harbor.ec-leasing.ru/as_15_8/as-15-8-executor:latest
        deploy:
            mode: global
        networks:
            - as-15-8-net
        environment:
            PROFILE: test
            TZ: "Europe/Moscow"
        volumes:
            - ~/as-15-8-modules/executor-module/logs:/log
    analyzer:
        image: harbor.ec-leasing.ru/as_15_8/as-15-8-analyzer:latest
        deploy:
            mode: global
        networks:
            - as-15-8-net
        environment:
            PROFILE: test
            TZ: "Europe/Moscow"
        volumes:
            - ~/as-15-8-modules/analyzer-module/logs:/log