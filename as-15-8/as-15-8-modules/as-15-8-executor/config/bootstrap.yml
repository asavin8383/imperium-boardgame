server:
  port: 11100
logging:
  config: config/logback-spring.xml
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true
spring:
  application.name: executor
  cloud:
    bus.trace.enabled: true
    config:
      bus.enabled: true
      discovery.enabled: true
      discovery.serviceId: config_server
      profile: default
      label: latest
    stream:
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094