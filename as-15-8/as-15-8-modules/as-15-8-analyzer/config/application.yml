server:
  port: 11200
logging:
  config: config/logback-spring.xml
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true
spring:
  application.name: analyzer
  cloud:
    stream:
      bindings:
        input:
          content-type: application/json
          group: analyzers
        output:
          content-type: application/json
        notifications:
          content-type: application/json
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
        bindings:
          input:
            consumer:
              autoCommitOffset: false
              ackEachRecord: true
              configuration:
                max.poll.records: 1
                max.poll.interval.ms: 1800000
          output:
            producer:
              configuration:
                max.request.size: 10000000
source_path_vpn: /logs/content.txt
source_path_anonym: /logs/content.txt

---

spring:
  profiles: prod
  cloud.stream:
    bindings:
      input:
        destination: exec_results
        consumer:
          concurrency: 4
      output.destination: analysis_results
      notifications.destination: job_notifications
    kafka:
      binder:
        brokers: 10.97.220.141:9094,10.97.220.142:9094,10.97.220.143:9094

---

spring:
  profiles: test
  cloud.stream:
    bindings:
      input:
        destination: exec_results
        consumer:
          concurrency: 1
      output.destination: analysis_results
      notifications.destination: job_notifications

---

spring:
  profiles: dev_ashabalin
  cloud.stream:
    bindings:
      input:
        destination: exec_results_ashabalin
        consumer:
          concurrency: 7
      output.destination: analysis_results_ashabalin
      notifications.destination: job_notifications_ashabalin
    kafka.bindings.jobs.consumer:
      configuration:
        max.poll.interval.ms: 300000

