server:
  port: 11200
logging:
  config: config/logback-spring.xml
spring:
  cloud:
    stream:
      bindings:
        input:
          content-type: application/json
          group: analyzers
        output:
          content-type: application/json
        notifications:
          content-type: application/json
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
        bindings:
          input:
            consumer:
              autoCommitOffset: false
              ackEachRecord: true
              configuration:
                max.poll.records: 1
                max.poll.interval.ms: 1800000
          output:
            producer:
              configuration:
                max.request.size: 10000000

---

spring:
  profiles: prod
  cloud.stream:
    bindings:
      input.destination: exec_results
      output.destination: analysis_results
      notifications.destination: job_notifications
    kafka:
      binder:
        brokers: 10.97.220.141:9094,10.97.220.142:9094,10.97.220.143:9094
      bindings.jobs.consumer:
        concurrency: 4

---

spring:
  profiles: test
  cloud.stream:
    bindings:
      input.destination: exec_results
      output.destination: analysis_results
      notifications.destination: job_notifications
    kafka.bindings.jobs.consumer:
        concurrency: 4

