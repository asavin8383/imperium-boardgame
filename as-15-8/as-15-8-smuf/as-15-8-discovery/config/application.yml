subsystem: SMUF
server:
  port: 8761
logging:
  config: config/logback-spring.xml
spring:
  application.name: discovery
eureka:
  instance:
    preferIpAddress: true
    instanceId: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
  client:
    fetch-registry: false
    oauth2:
      clientId: discovery
      clientSecret: 1q0p2w9o
      grantType: client_credentials
      accessTokenUri: http://localhost:15805/oauth/token
security:
  oauth2:
    resource:
      tokenInfoUri: http://localhost:15805/oauth/check_token
    client:
      clientId: discovery
      clientSecret: 1q0p2w9o
      grantType: client_credentials
      accessTokenUri: http://localhost:15805/oauth/token

---

spring:
  profiles: test, prod
  profiles.include: docker_log
  main:
    banner-mode: "off"

---

spring:
  profiles: dev_asavin, dev_ashabalin
  profiles.include: local_log
  main:
    banner-mode: "off"
