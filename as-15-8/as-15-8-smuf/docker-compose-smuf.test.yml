version: '3.7'
services:
  discovery:
    container_name: discovery
    image: harbor.ec-leasing.ru/as_15_8/as-15-8-discovery
    restart: always
    network_mode: "host"
    volumes:
      - ~/as-15-8-smuf/discovery/logs:/log
      - ~/as-15-8-smuf/discovery/config:/config
    environment:
      PROFILE: test
      TZ: "Europe/Moscow"
    ports:
      - "8761:8761"
  gateway:
    container_name: gateway
    image: harbor.ec-leasing.ru/as_15_8/as-15-8-gateway
    restart: always
    network_mode: "host"
    depends_on:
      - discovery
    volumes:
      - ~/as-15-8-smuf/gateway/logs:/log
      - ~/as-15-8-smuf/gateway/config:/config
    environment:
      PROFILE: test
      EUREKA_URI: http://192.168.5.253:8761
      TZ: "Europe/Moscow"
    ports:
      - "15880:15880"
  config-server:
    container_name: config-server
    image: harbor.ec-leasing.ru/as_15_8/as-15-8-config-server
    restart: always
    network_mode: "host"
    depends_on:
      - discovery
      - gateway
    volumes:
      - ~/as-15-8-smuf/config-server/logs:/log
      - ~/as-15-8-smuf/config-server/config:/config
    environment:
      PROFILE: test
      GATEWAY_URI: http://192.168.5.253:15880
      TZ: "Europe/Moscow"
    ports:
      - "15802:15802"