  profiles: test
  profiles.include: docker_log
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:postgresql://192.168.5.195:5432/asdb
  cloud:
    stream:
      bindings:
        springCloudBusInput:
          destination: bus_config_output
        springCloudBusOutput:
