---

logging:
  config:
  level:
    root: info
spring:
  profiles: dev_asin
  profiles.include: local_log
  datasource:
    url: jdbc:postgresql://192.168.5.195:5432/asdb_test
  liquibase:
    enabled: false
  cloud:
    bus.trace.enabled: false
    config:
      bus:
        enabled: false
    stream:
      bindings:
        springCloudBusInput:
          group: config_server
      kafka.binder:
        brokers:

