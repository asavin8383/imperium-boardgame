subsystem: SMUF
server:
  port: 15802
gateway.url: ${GATEWAY_URI:http://localhost:15880}
logging:
  config: config/logback-spring.xml
eureka:
  client:
    fetchRegistry: false
    serviceUrl:
      defaultZone: ${gateway.url}/eureka
    oauth2:
      clientId: config-server
      clientSecret: 1q0p2w9o
      grantType: client_credentials
      accessTokenUri: ${gateway.url}/security/oauth/token
  instance:
    preferIpAddress: true
    instanceId: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
    metadata-map:
      subsystem: ${subsystem}
security:
  oauth2:
    resource:
      tokenInfoUri: ${gateway.url}/security/oauth/check_token
    client:
      clientId: config-server
      clientSecret: 1q0p2w9o
      grantType: client_credentials
      accessTokenUri: ${gateway.url}/security/oauth/token
spring:
  application.name: config_server
  profiles.include: jdbc
  main.allow-bean-definition-overriding: true
  liquibase:
    enabled: true
    change-log: classpath:db/db.changelog.master.xml
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    max-active: 5
    username: as_user
    password: as_user
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect
  cloud:
    bus.trace.enabled: true
    config:
      bus:
        enabled: true
      server.jdbc:
        sql: SELECT key, value from config.config where application=? and profile=? and label=?
        order: 1
        default-profile: default
        default-label: latest
    stream:
      bindings:
        springCloudBusInput:
          destination: bus_config_output
          group: config_server
        springCloudBusOutput:
          destination: bus_config_input
      kafka.binder:
        brokers: 192.168.5.12:9094,192.168.5.33:9094,192.168.5.184:9094
        minPartitionCount: 24
management.endpoints.web.exposure.include: bus-refresh
user.activity.timeout.config.key: user.activity.timeout

