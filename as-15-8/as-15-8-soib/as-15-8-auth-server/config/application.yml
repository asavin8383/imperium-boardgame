subsystem: SOIB
logging:
  config: config/logback-spring.xml
ldap:
  enabled: true
  domain: designdiv.ecleasing.ru
  source:
    url: ldap://192.168.1.52:389/
    base: OU=AS_15_8,DC=designdiv,DC=ecleasing,DC=ru
    userDn: sa
    password: 12345
    pooled: true
management:
  health:
    ldap:
      enabled: false
spring:
  main:
    allow-bean-definition-overriding: true
  liquibase:
    enabled: true
    change-log: classpath:db/db.changelog.master.xml
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    max-active: 5
    username: as_user
    password: as_user
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect

