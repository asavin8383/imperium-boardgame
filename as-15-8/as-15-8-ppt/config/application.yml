subsystem: PPT
server:
  port: 15800
  tomcat:
    max-threads: 200
gateway.url: ${GATEWAY_URI:http://localhost:15880}
logging:
  config: config/logback-spring.xml
eureka:
  client:
    serviceUrl:
      defaultZone: ${gateway.url}/eureka
  instance:
    preferIpAddress: true
    instanceId: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
spring:
  application:
    name: ppt
  main.allow-bean-definition-overriding: true
  liquibase:
    enabled: false
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    username: as_user
    password: as_user
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect
  cloud:
    stream:
      bindings:
        outputArrangementJobs:
          content-type: application/json
        inputArrangementNotifications:
          content-type: application/json
          group: ppt
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094

---

spring:
  profiles: prod
  profiles.include: docker_log
  main:
    banner-mode: "off"
  jpa:
    hibernate:
      ddl-auto: none
  datasource:
    url: jdbc:postgresql://10.97.220.144:5432/asdb
  cloud:
    stream:
      bindings:
        outputArrangementJobs:
          destination: arrangements
        inputArrangementNotifications:
          destination: arrangement_notifications
      kafka:
        binder:
          brokers: 10.97.220.141:9094,10.97.220.142:9094,10.97.220.143:9094
cron:
  expression:
    arrangement: "0 * * ? * *"

