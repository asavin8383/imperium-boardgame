version: '3'
services:
  as-15-8-rest:
    container_name: ppt
    image: dcr.ec-leasing.ru/as-15-8/as-15-8-ppt
    restart: always
    volumes:
      - ~/as-15-8-ppt/logs:/log
      - ~/as-15-8-ppt/config:/config
    environment:
      PROFILE: prod
      TZ: "Europe/Moscow"
    ports:
      - "15800:15800"