server:
  port: 15802
logging:
  config: config/logback-spring.xml
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true
    instanceId: ${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
spring:
  application.name: config_server
  profiles.include: jdbc
  liquibase:
    enabled: true
    change-log: classpath:db/db.changelog.master.xml
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    max-active: 5
    username: as_user
    password: as_user
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect
  cloud:
    bus.trace.enabled: true
    config:
      bus:
        enabled: true
      server.jdbc:
        sql: SELECT key, value from config.config where application=? and profile=? and label=?
        order: 1
        default-profile: test
        default-label: latest
    stream:
      bindings:
        springCloudBusInput:
          group: config_server
      kafka.binder:
        brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
management.endpoints.web.exposure.include: bus-refresh

---

spring:
  profiles: prod
  datasource:
    url: jdbc:postgresql://10.97.220.144:5432/asdb
  cloud:
    stream:
      bindings:
        springCloudBusInput:
          destination: bus_config_output
        springCloudBusOutput:
          destination: bus_config_input

