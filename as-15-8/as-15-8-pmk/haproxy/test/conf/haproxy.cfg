global
 daemon
 maxconn 256

defaults
 mode http
 timeout connect 5000ms
 timeout client 50000ms
 timeout server 50000ms

listen stats
 bind *:9999
 stats enable
 stats hide-version
 stats uri /
 stats auth admin:1q0p2w9o

frontend google
 bind *:15801
 use_backend soax_proxy

frontend yandex
 bind *:15802
 use_backend soax_proxy