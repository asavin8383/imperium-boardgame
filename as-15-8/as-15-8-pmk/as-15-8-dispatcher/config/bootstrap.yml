subsystem: PMK
server:
  port: 11300
gateway.url: ${GATEWAY_URI:http://localhost:15880}
system.mode.autoconfig:
  url: ${gateway.url}/config/mode
logging:
  config: config/logback-spring.xml
eureka:
  client:
    fetchRegistry: false
    serviceUrl:
      defaultZone: ${gateway.url}/eureka
    oauth2:
      clientId: dispatcher
      clientSecret: 1q0p2w9o
      grantType: client_credentials
      accessTokenUri: ${gateway.url}/security/oauth/token
  instance:
    preferIpAddress: true
    instanceId: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
    metadata-map:
      subsystem: ${subsystem}
security:
  oauth2:
    resource:
      jwk:
        keySetUri: ${gateway.url}/security/.well-known/jwks.json
    client:
      clientId: dispatcher
      clientSecret: 1q0p2w9o
      grantType: client_credentials
      accessTokenUri: ${gateway.url}/security/oauth/token
spring:
  application:
    name: dispatcher
  cloud:
    config:
      bus.enabled: false
      uri: ${gateway.url}/config
      fail-fast: true
      profile: default
      label: latest
      client:
        oauth2:
          clientId: dispatcher
          clientSecret: 1q0p2w9o
          grantType: client_credentials
          accessTokenUri: ${gateway.url}/security/oauth/token