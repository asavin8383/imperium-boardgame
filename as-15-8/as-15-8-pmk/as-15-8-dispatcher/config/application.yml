spring:
  main.allow-bean-definition-overriding: true
  cloud:
    stream:
      bindings:
        inputJobs:
          destination: scheduled_jobs
          content-type: application/json
          group: dispatchers
          consumer:
            concurrency: 12
        outputJobs:
          destination: jobs
          content-type: application/json
        inputJobNotifications:
          content-type: application/json
          destination: job_notifications
          group: dispatchers
        inputAnalysisResults:
          content-type: application/json
          destination: analysis_results
          group: dispatchers
          consumer:
            concurrency: 12
        springCloudBusInput:
          group: dispatcher:${spring.cloud.client.ip-address}
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
          configuration:
            max.request.size: 10485760
        bindings:
          incomingArrangements:
            consumer:
              startOffset: earliest
              application-id: dispatcher
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    max-active: 5
    username: as_user
    password: as_user
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect

---

spring:
  profiles: prod
  profiles.include: docker_log
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:postgresql://10.97.220.144:5432/asdb
  liquibase:
    enabled: true
    change-log: classpath:/data/changelog/db.changelog.master.xml
  cloud:
    stream:
      kafka:
        binder:
          brokers: 10.97.220.141:9094,10.97.220.142:9094,10.97.220.143:9094

