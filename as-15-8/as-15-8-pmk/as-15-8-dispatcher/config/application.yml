spring:
  main.allow-bean-definition-overriding: true
  cloud:
    stream:
      bindings:
        inputJobNotifications:
          destination: job_notifications
        inputAnalysisResults:
          destination: analysis_results
        springCloudBusInput:
          destination: bus_config_input
          group: dispatcher:${spring.cloud.client.ip-address}
        springCloudBusOutput.destination: bus_config_output
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.33:9094,192.168.5.184:9094
          minPartitionCount: 24
        streams.binder:
          brokers: 192.168.5.12:9094,192.168.5.33:9094,192.168.5.184:9094
          minPartitionCount: 24
          configuration:
            commit.interval.ms: 1000
            max.request.size: 10485760
            max.partition.fetch.bytes: 10485760
            max.poll.records: 100
        bindings:
          inputJobNotifications:
            consumer.application-id: dispatcher
          inputAnalysisResults:
            consumer.application-id: dispatcher
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    max-active: 5
    username: as_user
    password: as_user
  liquibase:
    enabled: true
    change-log: classpath:/data/db.changelog.master.xml
  jpa:
    properties:
      hibernate:
        jdbc:
          lob.non_contextual_creation: true
          batch_size: 100
          order_inserts: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect
  jackson.serialization.FAIL_ON_EMPTY_BEANS: false
results.save.schedule: '0 0 0 * * ?'

---

spring:
  profiles: prod
  profiles.include: docker_log
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:postgresql://10.97.220.144:5432/asdb
  cloud:
    stream:
      kafka:
        binder:
          brokers: 10.97.220.178:9092,10.97.220.179:9092,10.97.220.180:9092
          minPartitionCount: 250
        streams.binder:
            brokers: 10.97.220.178:9092,10.97.220.179:9092,10.97.220.180:9092
            minPartitionCount: 250
eureka:
