spring:
  main.allow-bean-definition-overriding: true
  cloud:
    stream:
      bindings:
        inputJobs:
          destination: scheduled_jobs
          group: dispatchers
          consumer.concurrency: 28
        outputJobs:
          destination: jobs
        inputJobNotifications:
          destination: job_notifications
          group: dispatchers
        inputAnalysisResults:
          destination: analysis_results
          group: dispatchers
          consumer.concurrency: 28
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
          minPartitionCount: 28
          configuration:
            max.request.size: 10485760
        bindings:
          inputJobs:
            consumer:
              consumer:
                ackEachRecord: true
                configuration:
                  max.poll.records: 1
                  max.poll.interval.ms: 3600000
          inputJobNotifications:
            consumer:
              consumer:
                autoCommitOffset: false
                ackEachRecord: true
                configuration:
                  max.poll.records: 1
                  max.poll.interval.ms: 3600000
          inputAnalysisResults:
            consumer:
              consumer:
                autoCommitOffset: false
                ackEachRecord: true
                configuration:
                  max.poll.records: 1
                  max.poll.interval.ms: 3600000
  datasource:
    test-while-idle: true
    validation-query: SELECT 1;
    time-between-eviction-runs-millis: 300000
    max-active: 5
    username: as_user
    password: as_user
  liquibase:
    enabled: true
    change-log: classpath:/data/db.changelog.master.xml
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    databasePlatform: org.hibernate.dialect.PostgreSQL9Dialect
  jackson.serialization.FAIL_ON_EMPTY_BEANS: false

---

spring:
  profiles: prod
  profiles.include: docker_log
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:postgresql://10.97.220.144:5432/asdb
  cloud:
    stream:
      kafka:
        binder:
          brokers: 10.97.220.178:9092,10.97.220.179:9092,10.97.220.180:9092

