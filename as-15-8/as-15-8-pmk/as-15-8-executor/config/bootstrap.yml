subsystem: PMK
server:
  port: 11100
gateway.url: ${GATEWAY_URI:http://localhost:15880}
logging:
  config: config/logback-spring.xml
eureka:
  client:
    serviceUrl:
      defaultZone: ${gateway.url}/eureka
  instance:
    preferIpAddress: true
    instanceId: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
spring:
  application.name: executor
  cloud:
    config:
      bus.enabled: true
      discovery.enabled: true
      discovery.serviceId: config_server
      profile: default
      label: latest

---

spring:
  profiles: dev_jspirina
  cloud:
    config:
      uri: http://localhost:15802
      profile: default
      label: latest