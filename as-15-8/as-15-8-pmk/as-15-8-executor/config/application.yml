spring:
  profiles: dev_ashabalin
  cloud:
    config:
      uri: http://localhost:8081
      profile: default
      label: latest
    stream:
      bindings:
        jobs:
          destination: jobs_ashabalin
          consumer:
            concurrency: 7
        executionResults:
          destination: exec_results_ashabalin
        notifications:
          destination: job_notifications_ashabalin
        springCloudBusInput:
          destination: bus_config_input_ashabalin
        springCloudBusOutput:
          destination: bus_config_output_ashabalin
      kafka.bindings.jobs.consumer:
        configuration:
          max.poll.interval.ms: 300000

