selenium-hub-url: http://user:1q0p2w9o@192.168.5.75:4442/wd/hub
spring:
  cloud:
    stream:
      bindings:
        jobs:
          content-type: application/json
          group: executors
        executionResults:
          content-type: application/json
        notifications:
          content-type: application/json
        springCloudBusInput:
          group: executor:${spring.cloud.client.ip-address}
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
          configuration:
            max.request.size: 10485760
        bindings:
          jobs:
            consumer:
              autoCommitOffset: false
              ackEachRecord: true
              configuration:
                max.poll.records: 1
                max.poll.interval.ms: 3600000

---

spring:
  profiles: prod
  main:
    banner-mode: "off"
  cloud.stream:
    bindings:
      jobs:
        destination: jobs
        consumer:
          concurrency: 4
      executionResults:
        destination: exec_results
      notifications:
        destination: job_notifications
      springCloudBusInput:
        destination: bus_config_input
      springCloudBusOutput:
        destination: bus_config_output
    kafka:
      binder:
        brokers: 10.97.220.141:9094,10.97.220.142:9094,10.97.220.143:9094
selenium-hub-url: http://10.97.220.147:4444/wd/hub

