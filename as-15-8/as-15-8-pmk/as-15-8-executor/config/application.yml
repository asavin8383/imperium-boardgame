selenium-hub-url: http://user:1q0p2w9o@192.168.5.75:4442/wd/hub
spring:
  main.allow-bean-definition-overriding: true
  cloud:
    stream:
      bindings:
        jobs:
          destination: jobs
          group: executors
          consumer.concurrency: 4
        executionResults.destination: exec_results
        notifications.destination: job_notifications
        springCloudBusInput:
          destination: bus_config_input
          group: executor:${spring.cloud.client.ip-address}
        springCloudBusOutput.destination: bus_config_output
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.33:9094,192.168.5.184:9094
          minPartitionCount: 24
          configuration:
            max.request.size: 10485760
        bindings:
          jobs:
            consumer:
              ackEachRecord: true
              configuration:
                max.poll.records: 1
                max.poll.interval.ms: 300000
          executionResults:
            producer.configuration:
              key.serializer: org.springframework.kafka.support.serializer.JsonSerializer
          notifications:
            producer.configuration:
              key.serializer: org.springframework.kafka.support.serializer.JsonSerializer

---

spring:
  profiles: prod
  profiles.include: docker_log
  main:
    banner-mode: "off"
  cloud.stream:
    kafka.binder:
      brokers: 10.97.220.178:9092,10.97.220.179:9092,10.97.220.180:9092
      minPartitionCount: 250
    bindings:
      jobs:
        consumer.concurrency: 10
selenium-hub-url: http://10.97.220.165:15800/wd/hub
eureka:
  instance:
    metadata-map:
      expectedAmount: 25

