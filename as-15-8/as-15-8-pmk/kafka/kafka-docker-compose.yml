version: '3.2'
networks:
    kafka-net:
        external: true
volumes:
    kafka_data:
    zk_data:
    zk_datalog:
    zk_logs:
    kafdrop_conf:
services:
    zookeeper:
        image: dcr.ec-leasing.ru/kafka/zookeeper:3.5
        ports:
            - "2181:2181"
        networks:
            - kafka-net
        environment:
            REPLICAS: 3
            SERVICE_NAME: zookeeper
            TZ: "Europe/Moscow"
        volumes:
            - zk_data:/data
            - zk_datalog:/datalog
            - zk_logs:/logs
            - /etc/timezone:/etc/timezone:ro
        deploy:
            placement:
                constraints:
                    - node.role == manager
            mode: replicated
            replicas: 3

    kafka:
        image: dcr.ec-leasing.ru/kafka/kafka:2.12-2.2.0
        depends_on:
            - zookeeper
        deploy:
            mode: global
        ports:
            - target: 9094
              published: 9094
              protocol: tcp
              mode: host
            - target: 9092
              published: 9092
              protocol: tcp
              mode: host
        hostname: "{{.Node.Hostname}}"
        networks:
            - kafka-net
        environment:
            TZ: "Europe/Moscow"
            HOSTNAME_COMMAND: "docker info | grep 'Node Address' | cut -d' ' -f 4"
            BROKER_ID_COMMAND: "docker info | grep 'Node Address' | cut -d' ' -f 4 | cut -d'.' -f 4"
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
            KAFKA_ADVERTISED_LISTENERS: INSIDE://_{HOSTNAME_COMMAND}:9092,OUTSIDE://_{HOSTNAME_COMMAND}:9094
            KAFKA_LISTENERS: INSIDE://:9092,OUTSIDE://:9094
            KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
            KAFKA_DEFAULT_REPLICATION_FACTOR: 2
            KAFKA_NUM_PARTITIONS: 24
            KAFKA_MESSAGE_MAX_BYTES: 10000000
            KAFKA_MAX_REQUEST_SIZE: 10000000
            #            KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 1000000
            KAFKA_JMX_OPTS: >
                -Dcom.sun.management.jmxremote
                -Dcom.sun.management.jmxremote.authenticate=false
                -Dcom.sun.management.jmxremote.ssl=false
                -Djava.rmi.server.hostname=192.168.5.12
                -Dcom.sun.management.jmxremote.rmi.port=1099
            # JMX_PORT: 1099
        volumes:
            - /opt/kafka/logs:/opt/kafka/logs
            - /var/run/docker.sock:/var/run/docker.sock
            - kafka_data:/kafka
            - /etc/timezone:/etc/timezone:ro

    kafdrop:
        image: dcr.ec-leasing.ru/kafka/kafdrop:2.0.0
        depends_on:
            - zookeeper
            - kafka
        ports:
            - "9010:9010"
        deploy:
            placement:
                constraints:
                    - node.role == manager
            mode: replicated
            replicas: 1
        environment:
            TZ: "Europe/Moscow"
            ZK_HOSTS: zookeeper:2181
            LISTEN: 9010
        networks:
            - kafka-net
        volumes:
            - kafdrop_conf:/root/.m2
            - /etc/timezone:/etc/timezone:ro

    kafka-manager:
        image: dcr.ec-leasing.ru/kafka/kafka-manager:2.0.0.2
        depends_on:
            - zookeeper
            - kafka
        ports:
            - "9000:9000"
        deploy:
            placement:
                constraints:
                    - node.role == manager
            mode: replicated
            replicas: 1
        environment:
            TZ: "Europe/Moscow"
            ZK_HOSTS: zookeeper:2181
            APPLICATION_SECRET: 1q0p2w9o
        networks:
            - kafka-net
        volumes:
            - /etc/timezone:/etc/timezone:ro