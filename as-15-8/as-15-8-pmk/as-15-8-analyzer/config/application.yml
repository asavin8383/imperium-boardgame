spring:
  main.allow-bean-definition-overriding: true
  cloud:
    stream:
      bindings:
        input:
          destination: exec_results
          group: analyzers
          consumer.concurrency: 4
        output.destination: analysis_results
        notifications.destination: job_notifications
        springCloudBusInput.destination: bus_config_input
        springCloudBusOutput:
          destination: bus_config_output
          group: analyzer:${spring.cloud.client.ip-address}
      kafka:
        binder:
          brokers: 192.168.5.12:9094,192.168.5.184:9094,192.168.5.211:9094
          configuration:
            max.request.size: 10485760
        bindings:
          input:
            consumer:
              autoCommitOffset: false
              ackEachRecord: true
              configuration:
                max.poll.records: 1
                max.poll.interval.ms: 1800000
          output:
            producer:
              configuration:
                max.request.size: 10000000
gateway.url: ${GATEWAY_URI:http://localhost:15880}
source_path_vpn: /logs/content.txt
source_path_anonym: /logs/content.txt

---

spring:
  profiles: prod
  profiles.include: docker_log
  main:
    banner-mode: "off"
  cloud.stream:
    kafka:
      binder:
        brokers: 10.97.220.141:9094,10.97.220.142:9094,10.97.220.143:9094

---

spring:
  profiles: test
  profiles.include: docker_log
  main:
    banner-mode: "off"
  cloud.stream:
    bindings:
      input:
        consumer.concurrency: 1

---

spring:
  profiles: dev_ashabalin, dev_asinyavin, dev_asavin, dev_pvorobiev, dev_jspirina
  profiles.include: local_log
  cloud.stream:
    bindings:
      input:
        consumer:
          concurrency: 7
    kafka.bindings.jobs.consumer:
      configuration:
        max.poll.interval.ms: 300000

---

spring:
  profiles: dev_ashabalin
  cloud.stream:
    bindings:
      input.destination: exec_results_ashabalin
      output.destination: analysis_results_ashabalin
      notifications.destination: job_notifications_ashabalin
      springCloudBusInput.destination: bus_config_input_ashabalin
      springCloudBusOutput.destination: bus_config_output_ashabalin

