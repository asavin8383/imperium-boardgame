events {
  worker_connections 2000;
}

http {
  upstream ggr {
    least_conn;
    server 10.97.220.226:4445;
    server 10.97.220.227:4445;
    server 10.97.220.228:4445;
  }

  server {
    listen 15800;
    server_name as-15-8-selenoid;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
      proxy_pass http://ggr;
      proxy_set_header Authorization "Basic dXNlcjoxcTBwMnc5bw==";
      proxy_connect_timeout 160s;
      proxy_read_timeout 600;
      proxy_send_timeout 600;
    }
  }
}