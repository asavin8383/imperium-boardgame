version: '3.7'
services:
  selenoid:
    image: dcr.ec-leasing.ru/as-15-8/selenoid/selenoid-hub:1.9.2
    deploy:
      mode: global
      placement:
        constraints:
          - node.role != manager
    networks:
      - selenoid-net
    ports:
      - target: 4444
        protocol: tcp
        mode: host
    hostname: "{{.Node.Hostname}}"
    configs:
      - source: selenoid_browsers
        target: /etc/selenoid/browsers.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/selenoid/logs:/opt/selenoid/logs
    command: ["-conf", "/etc/selenoid/browsers.json",
              "-log-output-dir", "/opt/selenoid/logs",
              "-limit", "6"]
  nginx:
    image: nginx:stable
    depends_on:
      - selenoid
      - ggr
    deploy:
      placement:
        constraints:
          - node.hostname == selenoid-control-01
      mode: replicated
      replicas: 1
    networks:
      - selenoid-net
    ports:
      - target: 15800
        protocol: tcp
        mode: host
    volumes:
      - "/opt/selenoid/nginx/conf/nginx.conf:/etc/nginx/nginx.conf"
      - "/opt/selenoid/nginx/logs:/var/log/nginx"
  ggr:
    image: dcr.ec-leasing.ru/as-15-8/selenoid/ggr:1.6.5
    depends_on:
      - selenoid
    deploy:
      placement:
        constraints:
          - node.role == manager
      mode: replicated
      replicas: 3
    networks:
      - selenoid-net
    ports:
      - target: 4445
        protocol: tcp
        mode: host
    configs:
      - source: ggr_quota
        target: /etc/grid-router/quota/user.xml
      - source: ggr_pass
        target: /etc/grid-router/users.htpasswd
    volumes:
      - "/opt/selenoid/ggr:/etc/grid-router"
    command: ["-quotaDir", "/etc/grid-router/quota", "-listen", ":4445"]
  ggr-ui:
    image: dcr.ec-leasing.ru/as-15-8/selenoid/ggr-ui:1.1.2
    depends_on:
      - selenoid
      - ggr
    deploy:
      placement:
        constraints:
          - node.hostname == selenoid-control-01
      mode: replicated
      replicas: 1
    networks:
      - selenoid-net
    ports:
      - target: 8888
        protocol: tcp
        mode: host
    volumes:
      - "/opt/selenoid/ggr:/etc/grid-router"
  selenoid-ui:
    image: dcr.ec-leasing.ru/as-15-8/selenoid/selenoid-ui:1.8.1
    depends_on:
      - selenoid
      - ggr
      - ggr-ui
    deploy:
      placement:
        constraints:
          - node.hostname == selenoid-control-01
      mode: replicated
      replicas: 1
    networks:
      - selenoid-net
    ports:
      - target: 8080
        protocol: tcp
        mode: host
    command: ["--status-uri", "http://10.97.220.226:8888",
              "--webdriver-uri", "http://10.97.220.226:15800"]

networks:
  selenoid-net:
    name: "host"
    external: true

configs:
  selenoid_browsers:
    file: ./browsers.json
  ggr_quota:
    file: ./ggr/quota/user.xml
  ggr_pass:
    file: ./ggr/users.htpasswd