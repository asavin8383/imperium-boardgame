version: '3.7'
services:
  selenoid:
    image: dcr.ec-leasing.ru/as-15-8/selenoid/selenoid-hub:1.9.2
    deploy:
      mode: global
    networks:
      - selenoid-net
    ports:
      - target: 4444
        protocol: tcp
        mode: host
    hostname: "{{.Node.Hostname}}"
    environment:
      TZ: "Europe/Moscow"
    configs:
      - source: selenoid_browsers
        target: /etc/selenoid/browsers.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/selenoid/logs:/opt/selenoid/logs
    command: ["-conf", "/etc/selenoid/browsers.json",
              "-log-output-dir", "/opt/selenoid/logs",
              "-limit", "6"]
  ggr:
    image: dcr.ec-leasing.ru/as-15-8/selenoid/ggr:1.6.5
    depends_on:
      - selenoid
    deploy:
      placement:
        constraints:
          - node.hostname == as158-selenium01
      mode: replicated
      replicas: 1
    networks:
      - selenoid-net
    ports:
      - target: 4445
        protocol: tcp
        mode: host
    environment:
      TZ: "Europe/Moscow"
    volumes:
      - "/opt/selenoid/ggr:/etc/grid-router"
    command: ["-quotaDir", "/etc/grid-router/quota", "-listen", ":4445"]
  ggr-ui:
    image: dcr.ec-leasing.ru/as-15-8/selenoid/ggr-ui:1.1.2
    depends_on:
      - selenoid
      - ggr
    deploy:
      placement:
        constraints:
          - node.hostname == as158-selenium01
      mode: replicated
      replicas: 1
    networks:
      - selenoid-net
    ports:
      - target: 8888
        protocol: tcp
        mode: host
    environment:
      TZ: "Europe/Moscow"
    volumes:
      - "/opt/selenoid/ggr:/etc/grid-router"
  selenoid-ui:
    image: dcr.ec-leasing.ru/as-15-8/selenoid/selenoid-ui:1.8.1
    depends_on:
      - selenoid
      - ggr
      - ggr-ui
    deploy:
      placement:
        constraints:
          - node.hostname == as158-selenium01
      mode: replicated
      replicas: 1
    networks:
      - selenoid-net
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    environment:
      TZ: "Europe/Moscow"
    command: ["--status-uri", "http://192.168.5.75:8888",
              "--webdriver-uri", "http://user:1q0p2w9o@192.168.5.75:4445"]

networks:
  selenoid-net:
    name: "host"
    external: true

configs:
  selenoid_browsers:
    file: ./browsers.json