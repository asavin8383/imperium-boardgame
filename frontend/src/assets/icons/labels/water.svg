<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Coin/medallion background - dark grey -->
  <circle cx="50" cy="50" r="46" fill="#5a5a5a" stroke="#3a3a3a" stroke-width="2"/>
  <circle cx="50" cy="50" r="42" fill="#6a6a6a" stroke="#4a4a4a" stroke-width="1"/>

  <!-- Water drop shape - white/light -->
  <!-- Drop: pointed top, round bottom -->
  <path d="M50 20 C50 20 32 42 32 56 C32 67 40 76 50 76 C60 76 68 67 68 56 C68 42 50 20 50 20 Z"
        fill="#e8e8e0" stroke="#c8c8c0" stroke-width="1"/>

  <!-- Shine/highlight on drop -->
  <ellipse cx="43" cy="45" rx="4" ry="7" fill="white" opacity="0.5" transform="rotate(-20 43 45)"/>
</svg>
