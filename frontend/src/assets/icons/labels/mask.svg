<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Coin/medallion background - stone grey -->
  <circle cx="50" cy="50" r="46" fill="#9a9a94" stroke="#7a7a74" stroke-width="2"/>
  <circle cx="50" cy="50" r="42" fill="#adadA6" stroke="#8a8a84" stroke-width="1"/>

  <!-- Mask face - white/light -->
  <ellipse cx="50" cy="50" rx="22" ry="26" fill="#e8e8e4" stroke="#aaaaaa" stroke-width="1.2"/>

  <!-- Left eye hole - almond shaped -->
  <ellipse cx="42" cy="44" rx="5" ry="3.5" fill="#7a7a74"/>

  <!-- Right eye hole - almond shaped -->
  <ellipse cx="58" cy="44" rx="5" ry="3.5" fill="#7a7a74"/>

  <!-- Mouth - neutral/slight sad curve -->
  <path d="M40 62 Q50 58 60 62" fill="none" stroke="#7a7a74" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtle chin -->
  <ellipse cx="50" cy="70" rx="10" ry="5" fill="#d8d8d4"/>
</svg>
