<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Coin/medallion background - light beige -->
  <circle cx="50" cy="50" r="46" fill="#c8c0b0" stroke="#a8a090" stroke-width="2"/>
  <circle cx="50" cy="50" r="42" fill="#d8d0c0" stroke="#b8b0a0" stroke-width="1"/>

  <!-- Sack body - dark green/grey -->
  <ellipse cx="50" cy="62" rx="22" ry="20" fill="#3a4a30" stroke="#2a3a20" stroke-width="1.5"/>

  <!-- Sack neck/tie -->
  <rect x="43" y="38" width="14" height="10" rx="3" fill="#3a4a30" stroke="#2a3a20" stroke-width="1.5"/>

  <!-- Tie knot -->
  <ellipse cx="50" cy="37" rx="8" ry="4" fill="#2a3a20"/>
  <!-- Knot loops -->
  <ellipse cx="44" cy="35" rx="5" ry="4" fill="none" stroke="#2a3a20" stroke-width="2"/>
  <ellipse cx="56" cy="35" rx="5" ry="4" fill="none" stroke="#2a3a20" stroke-width="2"/>

  <!-- Highlight on sack body -->
  <ellipse cx="43" cy="55" rx="6" ry="9" fill="#4a5a40" opacity="0.6"/>

  <!-- Sack bottom roundness line -->
  <path d="M30 68 Q50 82 70 68" fill="none" stroke="#2a3a20" stroke-width="1" opacity="0.5"/>
</svg>
