<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Coin/medallion background - dark blue-grey stone -->
  <circle cx="50" cy="50" r="46" fill="#4a4e5a" stroke="#2a2e3a" stroke-width="2"/>
  <circle cx="50" cy="50" r="42" fill="#555a66" stroke="#3a3e4a" stroke-width="1"/>

  <!-- House shape - light/cream -->
  <!-- Roof -->
  <polygon points="50,26 28,48 72,48" fill="#d8d0c0" stroke="#b0a890" stroke-width="1.2"/>

  <!-- House body -->
  <rect x="33" y="47" width="34" height="26" rx="1" fill="#d8d0c0" stroke="#b0a890" stroke-width="1.2"/>

  <!-- Door -->
  <rect x="44" y="58" width="12" height="15" rx="2" fill="#555a66"/>

  <!-- Left window -->
  <rect x="36" y="53" width="8" height="7" rx="1" fill="#555a66"/>

  <!-- Right window -->
  <rect x="56" y="53" width="8" height="7" rx="1" fill="#555a66"/>
</svg>
